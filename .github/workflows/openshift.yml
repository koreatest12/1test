name: Grand Ops All-in-One Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/mass-service-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: 🛠️ 1. 프로젝트 파일 자동 생성 (인라인 스크립트)
        run: |
          echo "서버 코드, Dockerfile, OpenShift 매니페스트를 즉석에서 생성합니다..."
          mkdir -p app deploy/openshift
          
          # [1] FastAPI 메인 애플리케이션 코드
          cat << 'EOF' > app/main.py
          from fastapi import FastAPI, HTTPException
          from pydantic import BaseModel
          import os, datetime

          app = FastAPI(title="Mass Service API")

          class DirReq(BaseModel): dirname: str
          class FileReq(BaseModel): filename: str; content: str

          @app.get("/health/ready")
          def health_check(): 
              return {"status": "ok", "time": datetime.datetime.utcnow().isoformat()}

          @app.post("/directories/create")
          def create_dir(req: DirReq):
              os.makedirs(req.dirname, exist_ok=True)
              return {"msg": f"Directory '{req.dirname}' created."}

          @app.post("/files/create")
          def create_file(req: FileReq):
              os.makedirs("tmp", exist_ok=True)
              with open(f"tmp/{req.filename}", "w") as f: f.write(req.content)
              return {"msg": f"File '{req.filename}' created."}
          EOF
          
          # [2] Python 의존성
          cat << 'EOF' > requirements.txt
          fastapi==0.104.1
          uvicorn==0.24.0
          pydantic==2.5.2
          EOF
          
          # [3] OpenShift 보안 정책(Non-root)을 준수하는 Dockerfile
          cat << 'EOF' > Dockerfile
          FROM python:3.11-slim
          WORKDIR /app
          RUN groupadd -r appgroup && useradd -r -g appgroup appuser \
              && mkdir -p /app/tmp && chown -R appuser:appgroup /app
          COPY requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt
          COPY ./app ./app
          USER appuser
          EXPOSE 8080
          CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
          EOF
          
          # [4] OpenShift 배포 리소스 (Deployment + Service 통합)
          cat << 'EOF' > deploy/openshift/manifests.yaml
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: mass-service-app
          spec:
            replicas: 1
            selector:
              matchLabels: { app: mass-service-app }
            template:
              metadata:
                labels: { app: mass-service-app }
              spec:
                containers:
                - name: mass-service-app
                  image: IMAGE_PLACEHOLDER
                  ports: [{ containerPort: 8080 }]
                  readinessProbe:
                    httpGet: { path: /health/ready, port: 8080 }
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: mass-service-app
          spec:
            selector: { app: mass-service-app }
            ports:
            - port: 8080
              targetPort: 8080
          EOF

      - name: 🐳 2. GitHub Container Registry (GHCR) 로그인
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 3. Buildah를 이용한 이미지 빌드
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ env.IMAGE_TAG }} latest
          containerfiles: ./Dockerfile

      - name: 🚀 4. GHCR에 이미지 푸시
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ env.IMAGE_TAG }} latest

      - name: 🔧 5. OpenShift CLI (oc) 설치
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: 4

      - name: 🔐 6. OpenShift 클러스터 로그인
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          insecure_skip_tls_verify: true
          # namespace: ${{ secrets.OPENSHIFT_NAMESPACE }} # 필요시 주석 해제

      - name: ☸️ 7. OpenShift에 자동 배포 적용
        run: |
          # 매니페스트 파일의 임시 이미지 주소를 실제 빌드된 GHCR 이미지 주소로 치환
          sed -i "s|IMAGE_PLACEHOLDER|${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}|g" deploy/openshift/manifests.yaml
          
          echo "OpenShift 리소스를 배포합니다..."
          oc apply -f deploy/openshift/manifests.yaml
          
          echo "배포 상태 확인:"
          oc get pods -l app=mass-service-app

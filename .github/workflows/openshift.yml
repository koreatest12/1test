name: Grand Ops Universe - GitOps Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: grand-ops-universe
  IMAGE_TAG: ${{ github.sha }}
  REGISTRY_NAMESPACE: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-gitops-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 코드를 저장소에 다시 커밋하기 위한 쓰기 권한
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: 🛠️ 1. Core API & 인프라 매니페스트 생성
        run: |
          echo "서버 코드와 GitOps 배포용 매니페스트를 생성합니다..."
          mkdir -p app deploy/openshift
          
          # [1] Core API 서버 코드
          cat << 'EOF' > app/main.py
          from fastapi import FastAPI
          import os, datetime
          
          app = FastAPI(title="Grand Ops Master-Universe Core API", version="3.0.0-GitOps")
          
          @app.get("/health/ready")
          def health_ready(): 
              return {"status": "ready", "architecture": "GitOps-Pull-Model", "time": datetime.datetime.utcnow().isoformat()}
          EOF
          
          # [2] 의존성
          cat << 'EOF' > requirements.txt
          fastapi==0.104.1
          uvicorn==0.24.0
          pydantic==2.5.2
          EOF
          
          # [3] DevSecOps 기반 Dockerfile
          cat << 'EOF' > Dockerfile
          FROM python:3.11-slim
          WORKDIR /app
          RUN groupadd -r grandops && useradd -r -g grandops opsadmin \
              && mkdir -p /app/tmp && chown -R opsadmin:grandops /app
          COPY requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt
          COPY ./app ./app
          USER opsadmin
          EXPOSE 8080
          CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
          EOF
          
          # [4] GitOps 배포용 통합 매니페스트 (이미지 태그는 다음 단계에서 동적으로 주입됨)
          cat << 'EOF' > deploy/openshift/manifests.yaml
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: grand-ops-universe
            labels: { app: grand-ops }
          spec:
            replicas: 2
            selector:
              matchLabels: { app: grand-ops }
            template:
              metadata:
                labels: { app: grand-ops }
              spec:
                securityContext:
                  runAsNonRoot: true
                containers:
                - name: core-app
                  image: IMAGE_PLACEHOLDER
                  ports: [{ containerPort: 8080 }]
                  readinessProbe:
                    httpGet: { path: /health/ready, port: 8080 }
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: grand-ops-service
          spec:
            selector: { app: grand-ops }
            ports: [{ port: 80, targetPort: 8080 }]
          ---
          apiVersion: route.openshift.io/v1
          kind: Route
          metadata:
            name: grand-ops-route
          spec:
            to: { kind: Service, name: grand-ops-service }
            port: { targetPort: 8080 }
            tls: { termination: edge }
          EOF

      - name: 🐳 2. GHCR 로그인
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 3. Buildah 이미지 빌드
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ env.IMAGE_TAG }} latest
          containerfiles: ./Dockerfile

      - name: 🚀 4. GHCR에 컨테이너 이미지 푸시
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ env.IMAGE_TAG }} latest
          registry: ${{ env.REGISTRY_NAMESPACE }}

      - name: 🔄 5. GitOps 매니페스트 이미지 태그 동기화
        run: |
          FULL_IMAGE="${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "새로운 이미지 태그 주입: $FULL_IMAGE"
          
          # 생성된 매니페스트의 IMAGE_PLACEHOLDER를 실제 이미지 경로로 치환
          sed -i "s|IMAGE_PLACEHOLDER|$FULL_IMAGE|g" deploy/openshift/manifests.yaml
          
          # GitOps 동기화를 위해 별도의 디렉토리로 이동
          mkdir -p gitops-manifests
          cp deploy/openshift/manifests.yaml gitops-manifests/grand-ops-deploy.yaml

      - name: 📝 6. GitOps Repository 업데이트 (OpenShift 인증 불필요)
        run: |
          # GitHub Actions 봇 권한으로 현재 저장소에 YAML 파일 자동 커밋
          git config --global user.name "GitHub Actions GitOps Bot"
          git config --global user.email "actions@github.com"
          
          git add gitops-manifests/grand-ops-deploy.yaml
          
          # 변경사항이 있을 경우에만 커밋 및 푸시
          if git diff-index --quiet HEAD; then
            echo "변경사항이 없습니다."
          else
            git commit -m "chore(gitops): update image tag to ${{ env.IMAGE_TAG }}"
            git push origin main
          fi

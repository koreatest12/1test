name: Grand Ops Universe - Secure GitOps Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CORE_IMAGE: grand-ops-core
  AUTH_IMAGE: grand-ops-auth
  IMAGE_TAG: ${{ github.sha }}
  REGISTRY_NAMESPACE: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-gitops-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: 🛠️ 1. 인증(Auth) & 코어(Core) 서버 코드 및 매니페스트 생성
        run: |
          echo "인증 서버와 코어 서버 코드를 독립적으로 생성합니다..."
          mkdir -p app/core app/auth deploy/openshift
          
          # ==========================================
          # [1] Auth API 서버 (JWT 발급 및 인증 처리)
          # ==========================================
          cat << 'EOF' > app/auth/main.py
          from fastapi import FastAPI, HTTPException, Depends
          from pydantic import BaseModel
          import jwt, datetime, os
          
          app = FastAPI(title="Grand Ops Auth Server", version="1.0.0")
          SECRET_KEY = os.getenv("JWT_SECRET", "super-secure-secret-key")
          
          class LoginReq(BaseModel): username: str; password: str
          class TokenRes(BaseModel): access_token: str; token_type: str
          
          @app.get("/health/ready")
          def health_ready(): return {"status": "auth-ready"}
          
          @app.post("/token", response_model=TokenRes)
          def login(req: LoginReq):
              # 실제 환경에서는 DB 연동 및 Bcrypt 해시 검증 적용
              if req.username == "admin" and req.password == "admin123!":
                  payload = {
                      "sub": req.username,
                      "exp": datetime.datetime.utcnow() + datetime.timedelta(hours=1),
                      "role": "grand-admin"
                  }
                  token = jwt.encode(payload, SECRET_KEY, algorithm="HS256")
                  return {"access_token": token, "token_type": "bearer"}
              raise HTTPException(status_code=401, detail="Invalid credentials")
          EOF
          
          # ==========================================
          # [2] Core API 서버 (기존 비즈니스 로직)
          # ==========================================
          cat << 'EOF' > app/core/main.py
          from fastapi import FastAPI, Depends, HTTPException, Header
          import datetime
          
          app = FastAPI(title="Grand Ops Core API", version="3.1.0")
          
          @app.get("/health/ready")
          def health_ready(): return {"status": "core-ready"}
          
          @app.get("/secure-data")
          def get_secure_data(authorization: str = Header(None)):
              if not authorization or not authorization.startswith("Bearer "):
                  raise HTTPException(status_code=401, detail="Missing or invalid token")
              return {"msg": "Authentication successful", "data": "Top Secret Data"}
          EOF
          
          # ==========================================
          # [3] 공통 의존성 및 Dockerfile 생성
          # ==========================================
          cat << 'EOF' > requirements.txt
          fastapi==0.104.1
          uvicorn==0.24.0
          pydantic==2.5.2
          PyJWT==2.8.0
          EOF
          
          cat << 'EOF' > Dockerfile.auth
          FROM python:3.11-slim
          WORKDIR /app
          RUN groupadd -r grandops && useradd -r -g grandops opsadmin && chown -R opsadmin:grandops /app
          COPY requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt
          COPY ./app/auth ./app
          USER opsadmin
          EXPOSE 8080
          CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
          EOF
          
          cat << 'EOF' > Dockerfile.core
          FROM python:3.11-slim
          WORKDIR /app
          RUN groupadd -r grandops && useradd -r -g grandops opsadmin && chown -R opsadmin:grandops /app
          COPY requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt
          COPY ./app/core ./app
          USER opsadmin
          EXPOSE 8080
          CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
          EOF

          # ==========================================
          # [4] OpenShift GitOps 통합 매니페스트
          # ==========================================
          cat << 'EOF' > deploy/openshift/manifests.yaml
          ---
          # AUTH SERVER RESOURCES
          apiVersion: apps/v1
          kind: Deployment
          metadata: { name: grand-ops-auth }
          spec:
            replicas: 1
            selector: { matchLabels: { app: auth-server } }
            template:
              metadata: { labels: { app: auth-server } }
              spec:
                containers:
                - name: auth
                  image: AUTH_IMAGE_PLACEHOLDER
                  ports: [{ containerPort: 8080 }]
                  readinessProbe: { httpGet: { path: /health/ready, port: 8080 } }
          ---
          apiVersion: v1
          kind: Service
          metadata: { name: auth-service }
          spec:
            selector: { app: auth-server }
            ports: [{ port: 80, targetPort: 8080 }]
          ---
          apiVersion: route.openshift.io/v1
          kind: Route
          metadata: { name: auth-route }
          spec:
            to: { kind: Service, name: auth-service }
            port: { targetPort: 8080 }
            tls: { termination: edge }
          ---
          # CORE SERVER RESOURCES
          apiVersion: apps/v1
          kind: Deployment
          metadata: { name: grand-ops-core }
          spec:
            replicas: 2
            selector: { matchLabels: { app: core-server } }
            template:
              metadata: { labels: { app: core-server } }
              spec:
                containers:
                - name: core
                  image: CORE_IMAGE_PLACEHOLDER
                  ports: [{ containerPort: 8080 }]
                  readinessProbe: { httpGet: { path: /health/ready, port: 8080 } }
          ---
          apiVersion: v1
          kind: Service
          metadata: { name: core-service }
          spec:
            selector: { app: core-server }
            ports: [{ port: 80, targetPort: 8080 }]
          ---
          apiVersion: route.openshift.io/v1
          kind: Route
          metadata: { name: core-route }
          spec:
            to: { kind: Service, name: core-service }
            port: { targetPort: 8080 }
            tls: { termination: edge }
          EOF

      - name: 🐳 2. GHCR 로그인
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 3. Auth 서버 이미지 빌드 및 푸시
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.AUTH_IMAGE }}
          tags: ${{ env.IMAGE_TAG }} latest
          containerfiles: ./Dockerfile.auth
      - uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ env.AUTH_IMAGE }}
          tags: ${{ env.IMAGE_TAG }} latest
          registry: ${{ env.REGISTRY_NAMESPACE }}

      - name: 📦 4. Core 서버 이미지 빌드 및 푸시
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.CORE_IMAGE }}
          tags: ${{ env.IMAGE_TAG }} latest
          containerfiles: ./Dockerfile.core
      - uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ env.CORE_IMAGE }}
          tags: ${{ env.IMAGE_TAG }} latest
          registry: ${{ env.REGISTRY_NAMESPACE }}

      - name: 🔄 5. GitOps 매니페스트 이미지 태그 동기화
        run: |
          FULL_AUTH_IMAGE="${{ env.REGISTRY_NAMESPACE }}/${{ env.AUTH_IMAGE }}:${{ env.IMAGE_TAG }}"
          FULL_CORE_IMAGE="${{ env.REGISTRY_NAMESPACE }}/${{ env.CORE_IMAGE }}:${{ env.IMAGE_TAG }}"
          
          sed -i "s|AUTH_IMAGE_PLACEHOLDER|$FULL_AUTH_IMAGE|g" deploy/openshift/manifests.yaml
          sed -i "s|CORE_IMAGE_PLACEHOLDER|$FULL_CORE_IMAGE|g" deploy/openshift/manifests.yaml
          
          mkdir -p gitops-manifests
          cp deploy/openshift/manifests.yaml gitops-manifests/grand-ops-deploy.yaml

      - name: 📝 6. GitOps Repository 업데이트 (자동 커밋)
        run: |
          git config --global user.name "Grand Ops Bot"
          git config --global user.email "actions@github.com"
          git add gitops-manifests/grand-ops-deploy.yaml
          
          if git diff-index --quiet HEAD; then
            echo "변경사항 없음"
          else
            git commit -m "feat(gitops): update core & auth images to ${{ env.IMAGE_TAG }}"
            git push origin main
          fi

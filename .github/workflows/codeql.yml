name: "CodeQL Advanced Security Scan with Offline & Online AI Agents"

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "generated/**"
      - ".pytest_cache/**"
      - "__pycache__/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "generated/**"
      - ".pytest_cache/**"
      - "__pycache__/**"
  schedule:
    - cron: "21 2 * * 2"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  actions: read
  security-events: write 

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  enterprise-security-pipeline:
    name: "Systematic Build Compile & Multi-Layered Security Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      # -----------------------------------------------------------------------
      # 1. 레포지토리 체크아웃
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      # -----------------------------------------------------------------------
      # 2. 런타임 환경 구축 (Python 3.11 및 Java 17 표준 구성)
      # -----------------------------------------------------------------------
      - name: Setup Python Runtime
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # -----------------------------------------------------------------------
      # 3. [체계적 스캔 핵심 1] 소스 코드 선행 생성 (CodeQL 인덱싱 가시성 확보)
      # -----------------------------------------------------------------------
      - name: Pre-Deploy Source Code Files for Scanning
        shell: bash
        run: |
          echo "[Pipeline] CodeQL 인덱싱 전 소스 코드 물리적 선행 배치 시작..."
          mkdir -p .venv_ai_agent/agent_core
          mkdir -p src/main/java
          
          # [Java Agent 소스 생성 - 정식 소스 경로 구성]
          cat << 'JAVAEOF' > src/main/java/MassiveClaudeAgent.java
          import java.io.IOException;
          import java.net.URI;
          import java.net.http.HttpClient;
          import java.net.http.HttpRequest;
          import java.net.http.HttpResponse;
          import java.nio.file.Files;
          import java.nio.file.Path;
          import java.nio.file.Paths;
          import java.nio.file.StandardOpenOption;
          import java.time.Duration;
          import java.util.List;
          import java.util.Random;
          import java.util.concurrent.*;
          import java.util.stream.Collectors;
          import java.util.stream.IntStream;

          public class MassiveClaudeAgent {
              private static final String CLAUDE_API_URL = "https://api.anthropic.com/v1/messages";
              private static final String ANTHROPIC_VERSION = "2023-06-01";
              private final String apiKey;
              private final HttpClient httpClient;
              private final ExecutorService executor = Executors.newFixedThreadPool(50);
              private final Semaphore rateLimiter = new Semaphore(5); 
              private final Random random = new Random();
              private final boolean isMockMode;

              public MassiveClaudeAgent() {
                  String envKey = System.getenv("ANTHROPIC_API_KEY");
                  if (envKey == null || envKey.isBlank() || "null".equalsIgnoreCase(envKey.trim())) {
                      System.err.println("[WARN] API KEY 누락. 로컬 고성능 Mock 제너레이터 체제로 자동 전환합니다.");
                      this.apiKey = null;
                      this.isMockMode = true;
                  } else {
                      this.apiKey = envKey;
                      this.isMockMode = false;
                  }
                  this.httpClient = HttpClient.newBuilder().executor(executor).connectTimeout(Duration.ofSeconds(15)).build();
              }

              public CompletableFuture<String> callClaudeApi(String prompt, int ruleIndex) {
                  if (this.isMockMode) {
                      return CompletableFuture.supplyAsync(() -> {
                          try {
                              rateLimiter.acquire(); 
                              Thread.sleep(random.nextInt(30) + 10);
                              String mockIp = "192.168." + random.nextInt(255) + "." + random.nextInt(255);
                              String action = random.nextBoolean() ? "ALLOW" : "DENY";
                              return String.format("{\n  \"rule_id\": \"RULE-%d\",\n  \"target_ip\": \"%s\",\n  \"action\": \"%s\",\n  \"generated_by\": \"offline_mock_agent\"\n}", ruleIndex, mockIp, action);
                          } catch (Exception e) { throw new CompletionException(e); } finally { rateLimiter.release(); }
                      }, executor);
                  }

                  String jsonPayload = String.format("{\"model\": \"claude-3-haiku-20240307\", \"max_tokens\": 150, \"messages\": [{\"role\": \"user\", \"content\": \"%s\"}]}", prompt.replace("\"", "\\\""));
                  HttpRequest request = HttpRequest.newBuilder().uri(URI.create(CLAUDE_API_URL)).header("Content-Type", "application/json").header("x-api-key", this.apiKey).header("anthropic-version", ANTHROPIC_VERSION).POST(HttpRequest.BodyPublishers.ofString(jsonPayload)).build();
                  return CompletableFuture.supplyAsync(() -> {
                      try {
                          rateLimiter.acquire(); 
                          HttpResponse<String> response = httpClient.send(request, HttpResponse.BodyHandlers.ofString());
                          if (response.statusCode() == 429) { Thread.sleep(5000); }
                          else if (response.statusCode() != 200) { throw new RuntimeException("HTTP " + response.statusCode() + ": " + response.body()); }
                          return response.body();
                      } catch (Exception e) { throw new CompletionException(e); } finally { rateLimiter.release(); }
                  }, executor);
              }

              public void generateMassResources(int totalCount, int batchSize) {
                  System.out.println("[Mass Generator] 총 " + totalCount + "건 병렬 배치 생성 공정 기동...");
                  Path outputDir = Paths.get("generated/data/ai_seed");
                  try { Files.createDirectories(outputDir); } catch (IOException e) { throw new RuntimeException(e); }

                  for (int batch = 0; batch < totalCount; batch += batchSize) {
                      int currentBatchEnd = Math.min(batch + batchSize, totalCount);
                      List<CompletableFuture<Void>> futures = IntStream.range(batch, currentBatchEnd).mapToObj(i -> {
                          return callClaudeApi("방화벽 룰 생성", i).thenAccept(result -> {
                              try { Files.writeString(outputDir.resolve("rule_" + i + ".json"), result + "\n", StandardOpenOption.CREATE, StandardOpenOption.TRUNCATE_EXISTING); } catch (IOException e) {}
                          }).exceptionally(ex -> { return null; });
                      }).collect(Collectors.toList());
                      CompletableFuture.allOf(futures.toArray(new CompletableFuture[0])).join();
                  }
                  executor.shutdown();
              }
              public static void main(String[] args) { new MassiveClaudeAgent().generateMassResources(500, 100); }
          }
          JAVAEOF

          # [Python Agent 및 6노드 인프라 아키텍처 스크립트 선행 생성]
          cat > .venv_ai_agent/agent_core/ai_agent.py << 'PYEOF'
          import os, json, textwrap
          def run_agent():
              print("[Python Agent] 6대 분산 마이크로서비스 및 대량 시드 데이터 레이아웃 빌드...")
              dirs = ["generated/security_reports", "generated/openapi", 
                      "generated/server/gateway", "generated/server/security", "generated/server/migration", 
                      "generated/server/config", "generated/server/upgrade", "generated/server/fencing", 
                      "generated/data/seed", "generated/docker_cluster"]
              for d in dirs: os.makedirs(d, exist_ok=True)
              
              nodes = [{"node_id": f"NODE-{i:05d}", "status": "provisioned", "zone": "ap-northeast-2"} for i in range(1, 10001)]
              with open("generated/data/seed/mass_node_registry.json", "w", encoding="utf-8") as f: json.dump(nodes, f, indent=2)
              
              # Fencing 서비스 엔진 소스 자동 코드 생성 구조 확립
              fen_code = textwrap.dedent("""\
                  import uvicorn
                  from fastapi import FastAPI, HTTPException
                  from pydantic import BaseModel, Field
                  app = FastAPI(title='Enterprise Fencing Service', version='1.5.0')
                  class FenceRule(BaseModel):
                      target_ip: str = Field(..., pattern=r'^([0-9]{1,3}\.){3}[0-9]{1,3}$')
                      action: str = Field(..., pattern=r'^(ALLOW|DENY)$')
                  @app.get('/health')
                  def fencing_health(): return {'status': 'healthy'}
                  @app.post('/api/v1/fencing/apply')
                  def apply_fence(rule: FenceRule):
                      if rule.target_ip == '127.0.0.1' and rule.action == 'DENY': raise HTTPException(403)
                      return {'status': 'fenced', 'ip': rule.target_ip, 'action': rule.action}
                  if __name__ == '__main__': uvicorn.run(app, host='0.0.0.0', port=8050)
              """)
              with open("generated/server/fencing/fencing_main.py", "w", encoding="utf-8") as f: f.write(fen_code)
              
              # Gateway, Security 등 나머지 5개 서비스 메인 코드 기본 생성
              services = ['gateway', 'security', 'migration', 'config', 'upgrade']
              for svc in services:
                  code = f"import uvicorn\nfrom fastapi import FastAPI\napp = FastAPI(title='{svc.upper()} Node')\n" \
                         f"@app.get('/health')\ndef h(): return {{'status':'healthy'}}\n" \
                         f"if __name__ == '__main__': uvicorn.run(app, host='0.0.0.0', port=8000)\n"
                  with open(f"generated/server/{svc}/{svc}_main.py", "w") as f: f.write(code)
              print("[Python Agent] 모든 마이크로서비스 물리 소스 배치 완료.")
          if __name__ == "__main__": run_agent()
          PYEOF

      # -----------------------------------------------------------------------
      # 4. Initialize CodeQL (Java 및 Python 다중 언어 체계적 인덱싱 시작)
      # -----------------------------------------------------------------------
      - name: Initialize CodeQL Engine
        uses: github/codeql-action/init@v4
        with:
          languages: java, python
          queries: +security-extended,security-and-quality

      # -----------------------------------------------------------------------
      # 5. [체계적 스캔 핵심 2] CodeQL 추적 하에 정식 컴파일 프로세스 수행
      # -----------------------------------------------------------------------
      - name: Execute Traceable Java Compilation
        run: |
          echo "[Pipeline] CodeQL Build Tracer가 컴파일 공정을 추적합니다."
          # 소스 폴더 구조 내에서 정식 컴파일러(javac)를 기동하여 데이터베이스에 바인딩시킵니다.
          javac -d bin src/main/java/MassiveClaudeAgent.java

      # -----------------------------------------------------------------------
      # 6. Perform CodeQL Analysis (Java 빌드 이력과 Python 소스 동시 완전 분석)
      # -----------------------------------------------------------------------
      - name: Perform CodeQL Deep Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/pipeline-monitored-scan"
          upload: true

      # -----------------------------------------------------------------------
      # 7. 마이크로서비스 인프라 인젝션 및 오프라인 Python 에이전트 구동
      # -----------------------------------------------------------------------
      - name: Run Offline Python Data Agent
        run: |
          python -m venv .venv_ai_agent
          .venv_ai_agent/bin/pip install --upgrade pip urllib3 fastapi uvicorn httpx python-multipart pydantic
          .venv_ai_agent/bin/python .venv_ai_agent/agent_core/ai_agent.py

      # -----------------------------------------------------------------------
      # 8. 검증 완료된 자바 대량 데이터 동시성 에이전트 가동
      # -----------------------------------------------------------------------
      - name: Run Java Massive Data Concurrency Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          java -cp bin MassiveClaudeAgent

      # -----------------------------------------------------------------------
      # 9. 6개 분산 노드 실시간 기동 및 라이브 OpenAPI 명세서 통합 추출 공정
      # -----------------------------------------------------------------------
      - name: Live Cluster Deployment & Spec Extraction
        shell: bash
        run: |
          echo "[Deployment] 6대 분산 인프라 백그라운드 런타임 구동..."
          .venv_ai_agent/bin/python generated/server/gateway/gateway_main.py &
          .venv_ai_agent/bin/python generated/server/security/security_main.py &
          .venv_ai_agent/bin/python generated/server/migration/migration_main.py &
          .venv_ai_agent/bin/python generated/server/config/config_main.py &
          .venv_ai_agent/bin/python generated/server/upgrade/upgrade_main.py &
          .venv_ai_agent/bin/python generated/server/fencing/fencing_main.py &
          sleep 5
          
          cat << 'PYEOF' > generate_specs.py
          import urllib.request, json, os
          ports = {'gateway': 8000, 'security': 8000, 'migration': 8000, 'config': 8000, 'upgrade': 8000, 'fencing': 8050}
          os.makedirs('generated/openapi/specs', exist_ok=True)
          for name, port in ports.items():
              try:
                  url = f"http://127.0.0.1:{port}/openapi.json"
                  data = json.loads(urllib.request.urlopen(url).read())
                  with open(f"generated/openapi/specs/{name}_openapi.json", "w", encoding="utf-8") as f:
                      json.dump(data, f, indent=2, ensure_ascii=False)
              except Exception as e: print(f"Failed to fetch {name}: {e}")
          PYEOF
          .venv_ai_agent/bin/python generate_specs.py
          pkill -f uvicorn || true

      # -----------------------------------------------------------------------
      # 10. OWASP 공급망 방어 융합 (의존성 및 소스 자산 다각도 스캔)
      # -----------------------------------------------------------------------
      - name: OWASP Supply Chain Comprehensive Scan
        shell: bash
        run: |
          echo "[Security Scan] OWASP 규격 공급망 취약점 추적 개시..."
          mkdir -p generated/frontend
          cat << 'EOF' > generated/frontend/package.json
          { "name": "enterprise-frontend-bff", "version": "1.0.0", "dependencies": { "cross-spawn": "5.1.0" } }
          EOF
          cd generated/frontend
          npm install --package-lock-only --ignore-scripts > /dev/null 2>&1 || true
          npx -y cve-lite-cli advisories sync
          npx -y cve-lite-cli . --offline --json > ../security_reports/cve_lite_raw.json || true

      # -----------------------------------------------------------------------
      # 11. 최종 산출 자산 동기화 및 커밋/푸시 (동시성 충돌 방어)
      # -----------------------------------------------------------------------
      - name: Secure Git Concurrency Sync & Push
        if: github.event_name != 'pull_request'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -d "generated" ]; then
            git add generated/
            if git diff-index --quiet HEAD; then
              echo "[INFO] 인프라 자산 변경사항 없음. 파이프라인 정상 종료."
            else
              git commit -m "chore: CodeQL 정식 컴파일 추적 분석 통과 및 AI 에이전트 다각도 보안 시드 데이터 적재 [skip ci]"
              CURRENT_BRANCH=${GITHUB_REF#refs/heads/}
              git pull --rebase --autostash origin $CURRENT_BRANCH
              git push origin HEAD
            fi
          fi

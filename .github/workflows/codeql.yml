name: "CodeQL Advanced Security Scan"

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "generated/**"
      - ".pytest_cache/**"
      - "__pycache__/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "generated/**"
      - ".pytest_cache/**"
      - "__pycache__/**"
  schedule:
    # 매주 화요일 02:21 UTC 실행. 한국시간 기준 화요일 11:21입니다.
    - cron: "21 2 * * 2"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: "Analyze (${{ matrix.language }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        # 현재 저장소는 Python 스크립트 중심이므로 빈 배열 대신 python을 명시합니다.
        # CodeQL 지원 언어 예: cpp, csharp, go, java-kotlin, javascript-typescript, python, ruby, rust, swift
        language:
          - python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Print scan context
        shell: bash
        run: |
          echo "[CodeQL] repository=${GITHUB_REPOSITORY}"
          echo "[CodeQL] ref=${GITHUB_REF}"
          echo "[CodeQL] sha=${GITHUB_SHA}"
          echo "[CodeQL] language=${{ matrix.language }}"
          echo "[CodeQL] This workflow does not call external AI APIs."

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality

      # Python은 컴파일 언어가 아니므로 Autobuild를 사용하지 않습니다.
      # Java/C/C++/C# 등을 추가할 때만 별도 build 또는 autobuild 단계를 검토하십시오.

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

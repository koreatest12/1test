name: "Enterprise Django CI & Advanced Security EAI Pipeline"

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: "node24"
  NODE_OPTIONS: "--no-deprecation"
  PYTHONUTF8: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

permissions:
  contents: write
  actions: read
  security-events: write 
  pull-requests: write
  issues: write

concurrency:
  group: enterprise-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =======================================================================
  # [Job 1] Django Advanced CI (PostgreSQL DB 통합 무결성 검증)
  # =======================================================================
  django-advanced-ci:
    name: "Django CI (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: django_user
          POSTGRES_PASSWORD: django_password
          POSTGRES_DB: django_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Advanced Django & PostgreSQL Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "Django>=4.2,<5.3" psycopg2-binary pytest pytest-django coverage flake8 black isort bandit
          if [ -f requirements-ci.txt ]; then pip install -r requirements-ci.txt; elif [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Detect Django Project
        id: django_detect
        run: |
          if [ -f manage.py ]; then echo "has_django=true" >> "$GITHUB_OUTPUT"; else echo "has_django=false" >> "$GITHUB_OUTPUT"; fi

      - name: Code Quality & Static Security Checks (Format Auto-Fix)
        if: steps.django_detect.outputs.has_django == 'true'
        run: |
          black . || true
          isort . || true
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
          bandit -r . -x tests/ -ll -ii || true

      - name: Django PostgreSQL DB Migrations & Deploy Checks
        if: steps.django_detect.outputs.has_django == 'true'
        env:
          DATABASE_URL: postgres://django_user:django_password@localhost:5432/django_test_db
        run: |
          python manage.py makemigrations --check --dry-run || true
          python manage.py migrate || true
          python manage.py check --deploy --fail-level ERROR || true
          python manage.py collectstatic --no-post-process --noinput || true

      - name: Run Django Tests with DB Coverage
        if: steps.django_detect.outputs.has_django == 'true'
        env:
          DATABASE_URL: postgres://django_user:django_password@localhost:5432/django_test_db
        run: |
          coverage run manage.py test --verbosity 2
          coverage report -m || true

  # =======================================================================
  # [Job 2] Enterprise AI, EAI Security Pipeline & Dependabot Auto-Config
  # =======================================================================
  enterprise-ai-eai-security:
    name: "AI Agents, EAI Engine, OWASP & Dependabot Automation"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Multi-Runtime Environments
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      # -----------------------------------------------------------------------
      # [인프라 선행 배치] AI 노드, EAI 엔진 및 Dependabot 자동 구성 파일 생성
      # -----------------------------------------------------------------------
      - name: Pre-Deploy Source Codes & Dependabot Configuration
        shell: bash
        run: |
          mkdir -p .venv_ai_agent/agent_core src/main/java generated/security_reports generated/frontend
          mkdir -p .github/workflows
          
          # ===================================================================
          # 1. Dependabot 설정 파일 동적 프로비저닝 (의존성 패치 자동화)
          # ===================================================================
          cat << 'EOF' > .github/dependabot.yml
          version: 2
          updates:
            - package-ecosystem: "github-actions"
              directory: "/"
              schedule:
                interval: "weekly"
                day: "monday"
                time: "06:00"
                timezone: "Asia/Seoul"
              open-pull-requests-limit: 5
              labels:
                - "dependencies"
                - "github-actions"
                - "dependabot"
              commit-message:
                prefix: "deps"
                include: "scope"
              groups:
                github-actions-minor-patch:
                  patterns:
                    - "*"
                  update-types:
                    - "minor"
                    - "patch"
          EOF

          cat << 'EOF' > .github/workflows/dependabot-auto-process.yml
          name: Dependabot Auto Process

          on:
            pull_request:
              types:
                - opened
                - synchronize
                - reopened
                - ready_for_review

          permissions:
            contents: write
            pull-requests: write
            issues: write

          concurrency:
            group: dependabot-auto-${{ github.event.pull_request.number }}
            cancel-in-progress: true

          jobs:
            dependabot-auto-process:
              name: Label, approve, and auto-merge safe Dependabot PRs
              runs-on: ubuntu-latest
              if: >-
                github.event.pull_request.user.login == 'dependabot[bot]' &&
                github.event.pull_request.draft == false
              steps:
                - name: Fetch Dependabot metadata
                  id: metadata
                  uses: dependabot/fetch-metadata@v2.4.0
                  with:
                    github-token: "${{ secrets.GITHUB_TOKEN }}"
                - name: Echo Dependabot metadata
                  shell: bash
                  run: |
                    set -euo pipefail
                    echo "dependency-names=${{ steps.metadata.outputs.dependency-names }}"
                    echo "update-type=${{ steps.metadata.outputs.update-type }}"
                - name: Ensure labels exist
                  shell: bash
                  env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  run: |
                    set -euo pipefail
                    gh label create "dependencies" --description "Dependency update PR" --color "0366d6" || true
                    gh label create "dependabot" --description "Created by Dependabot" --color "7057ff" || true
                    gh label create "safe-patch" --description "Patch-level dependency update" --color "0e8a16" || true
                    gh label create "review-minor" --description "Minor dependency update" --color "fbca04" || true
                    gh label create "manual-review-major" --description "Major dependency update" --color "d73a4a" || true
                - name: Add common labels
                  shell: bash

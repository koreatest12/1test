name: "CodeQL Advanced Security Scan with Offline AI Agent"

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "generated/**"
      - ".pytest_cache/**"
      - "__pycache__/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "generated/**"
      - ".pytest_cache/**"
      - "__pycache__/**"
  schedule:
    # 매주 화요일 02:21 UTC 실행 (한국시간 화요일 11:21)
    - cron: "21 2 * * 2"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  actions: read
  security-events: write 

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: "Analyze (${{ matrix.language }})"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        language:
          - python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

      - name: Setup Python Runtime
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create Isolated Virtual Environment & Install Server Packages
        run: |
          python -m venv .venv_ai_agent
          .venv_ai_agent/bin/pip install --upgrade pip
          .venv_ai_agent/bin/pip install urllib3 fastapi uvicorn httpx python-multipart pydantic

      # -----------------------------------------------------------------------
      # 6. 오프라인 가상 에이전트 엔진 (Dependabot 스캔을 위한 requirements.txt 대량 추출 추가)
      # -----------------------------------------------------------------------
      - name: Deploy Offline Virtual Agent Engine & Generate Mass Container/Data Resources
        shell: bash
        run: |
          mkdir -p .venv_ai_agent/agent_core
          
          cat > .venv_ai_agent/agent_core/ai_agent.py << 'PYEOF'
          import os
          import json
          import textwrap
          import hashlib

          def run_agent():
              print("[Virtual Agent] Dependabot 규격 호환 데이터 파싱 및 타겟 디렉토리 대량 분배 개시.")

              dirs = [
                  "generated/security_reports",
                  "generated/ai_configs/claude",
                  "generated/ai_configs/gemini",
                  "generated/openapi",
                  "generated/server/gateway",
                  "generated/server/security",
                  "generated/server/migration",
                  "generated/server/config",
                  "generated/server/upgrade",
                  "generated/data/seed",       
                  "generated/docker_cluster"   
              ]
              for d in dirs:
                  os.makedirs(d, exist_ok=True)

              # Dependabot(Pip)이 스캔할 수 있도록 파이썬 의존성 명세서 추출
              with open("generated/requirements.txt", "w", encoding="utf-8") as f:
                  f.write("fastapi\nuvicorn\npydantic\nhttpx\npython-multipart\n")

              print("[Data Builder] 10,000건의 보안 룰 및 노드 식별자 Seed Data를 대량 생성합니다.")
              mass_nodes = []
              for i in range(1, 10001):
                  node_id = f"NODE-{i:05d}"
                  mass_nodes.append({
                      "node_id": node_id,
                      "status": "provisioned",
                      "cluster_zone": "ap-northeast-2" if i % 2 == 0 else "us-east-1",
                      "security_checksum": hashlib.sha256(node_id.encode()).hexdigest()[:12]
                  })
              with open("generated/data/seed/mass_node_registry.json", "w", encoding="utf-8") as f:
                  json.dump(mass_nodes, f, indent=2)

              gw_code = textwrap.dedent("""\
                  import uvicorn, re
                  from fastapi import FastAPI, HTTPException, Header
                  from typing import Optional
                  app = FastAPI(title='Enterprise AI Gateway Server', version='1.5.0')
                  NODE_PATTERN = re.compile(r'^[a-zA-Z0-9_\-]+$')
                  @app.get('/health')
                  def gateway_health(): return {'status': 'healthy'}
                  @app.post('/api/v1/validate/{node_id}')
                  def validate_node(node_id: str, x_auth_token: Optional[str] = Header(None)):
                      if not x_auth_token or len(x_auth_token) < 16: raise HTTPException(401)
                      if not NODE_PATTERN.match(node_id): raise HTTPException(400)
                      return {'status': 'authorized', 'node_id': node_id}
                  if __name__ == '__main__': uvicorn.run(app, host='0.0.0.0', port=8000)
              """)
              with open("generated/server/gateway/gateway_main.py", "w", encoding="utf-8") as f: f.write(gw_code)

              sec_code = textwrap.dedent("""\
                  import uvicorn, re
                  from fastapi import FastAPI, HTTPException
                  from pydantic import BaseModel, field_validator
                  app = FastAPI(title='Isolated Enterprise Security Node', version='1.5.0')
                  class QueryModel(BaseModel):
                      rule_id: str
                      @field_validator('rule_id')
                      @classmethod
                      def validate_rule(cls, v):
                          if not re.match(r'^SEC-[0-9]+$', v): raise ValueError('Invalid format')
                          return v
                  @app.get('/api/v1/security/status')
                  def security_node_status(): return {'status': 'healthy'}
                  @app.post('/api/v1/security/inspect')
                  def inspect_rule(query: QueryModel):
                      mock_db = {'SEC-101': 'Injection Defense Triggered'}
                      if query.rule_id not in mock_db: raise HTTPException(404)
                      return {'rule_id': query.rule_id, 'audit_result': mock_db[query.rule_id]}
                  if __name__ == '__main__': uvicorn.run(app, host='0.0.0.0', port=8080)
              """)
              with open("generated/server/security/security_main.py", "w", encoding="utf-8") as f: f.write(sec_code)

              mig_code = textwrap.dedent("""\
                  import uvicorn
                  from fastapi import FastAPI, HTTPException
                  from pydantic import BaseModel, Field
                  app = FastAPI(title='Enterprise Data Migration Engine', version='1.5.0')
                  class MigrationPayload(BaseModel):
                      target_node: str = Field(..., min_length=5, max_length=100)
                      resource_count: int = Field(..., ge=1, le=10000)
                  @app.post('/api/v1/migrate/transfer')
                  def execute_migration(payload: MigrationPayload):
                      if 'cluster' not in payload.target_node: raise HTTPException(403)
                      return {'status': 'healthy', 'migration_status': 'completed', 'destination': payload.target_node}
                  if __name__ == '__main__': uvicorn.run(app, host='0.0.0.0', port=8090)
              """)
              with open("generated/server/migration/migration_main.py", "w", encoding="utf-8") as f: f.write(mig_code)

              cfg_code = textwrap.dedent("""\
                  import uvicorn
                  from fastapi import FastAPI, HTTPException
                  from pydantic import BaseModel, Field
                  app = FastAPI(title='Enterprise Config Node', version='1.5.0')
                  class CommitPayload(BaseModel):
                      repo_name: str = Field(..., pattern=r'^[a-zA-Z0-9_\-]{3,50}$')
                      commit_message: str = Field(..., min_length=1, max_length=200)
                  @app.get('/health')
                  def config_health(): return {'status': 'healthy'}
                  @app.post('/api/v1/config/commit')
                  def record_commit(payload: CommitPayload):
                      if '..' in payload.commit_message: raise HTTPException(400)
                      return {'status': 'committed', 'repository': payload.repo_name}
                  if __name__ == '__main__': uvicorn.run(app, host='0.0.0.0', port=8070)
              """)
              with open("generated/server/config/config_main.py", "w", encoding="utf-8") as f: f.write(cfg_code)

              upg_code = textwrap.dedent("""\
                  import uvicorn
                  from fastapi import FastAPI, HTTPException
                  from pydantic import BaseModel, Field
                  app = FastAPI(title='OTA Upgrade Node', version='1.5.0')
                  class UpgradePayload(BaseModel):
                      component: str = Field(..., min_length=3, max_length=50)
                      force_update: bool = False
                  @app.get('/health')
                  def upgrade_health(): return {'status': 'healthy'}
                  @app.post('/api/v1/upgrade/apply')
                  def apply_upgrade(payload: UpgradePayload):
                      if payload.component == 'core-kernel' and not payload.force_update: raise HTTPException(400)
                      return {'status': 'upgraded', 'component': payload.component}
                  if __name__ == '__main__': uvicorn.run(app, host='0.0.0.0', port=8060)
              """)
              with open("generated/server/upgrade/upgrade_main.py", "w", encoding="utf-8") as f: f.write(upg_code)

              print("[Docker Builder] 각 서비스별 Dockerfile 및 docker-compose 매니페스트를 생성합니다.")
              services_meta = [
                  ("gateway", 8000, "gateway_main.py"),
                  ("security", 8080, "security_main.py"),
                  ("migration", 8090, "migration_main.py"),
                  ("config", 8070, "config_main.py"),
                  ("upgrade", 8060, "upgrade_main.py")
              ]
              
              docker_compose_services = []

              for svc_name, port, main_file in services_meta:
                  dockerfile_content = textwrap.dedent(f"""\
                      FROM python:3.11-slim
                      ENV PYTHONUNBUFFERED=1
                      WORKDIR /app
                      COPY {main_file} /app/main.py
                      RUN pip install --no-cache-dir fastapi uvicorn pydantic httpx
                      EXPOSE {port}
                      CMD ["python", "main.py"]
                  """)
                  with open(f"generated/server/{svc_name}/Dockerfile", "w", encoding="utf-8") as f:
                      f.write(dockerfile_content)
                  
                  docker_compose_services.append(textwrap.indent(textwrap.dedent(f"""\
                      {svc_name}:
                        build: 
                          context: ../server/{svc_name}
                          dockerfile: Dockerfile
                        ports:
                          - "{port}:{port}"
                        restart: unless-stopped
                  """), "  "))

              compose_content = "version: '3.8'\nservices:\n" + "".join(docker_compose_services)
              with open("generated/docker_cluster/docker-compose.yml", "w", encoding="utf-8") as f:
                  f.write(compose_content)

              with open("generated/.env.example", "w", encoding="utf-8") as f:
                  f.write("ENV=production\nTOKEN_LESS_MODE=TRUE\nAUTO_UPGRADE_ENABLED=TRUE\n")

          if __name__ == "__main__":
              run_agent()
          PYEOF

      - name: Execute Offline AI Virtual Agent via Venv Path
        shell: bash
        run: |
          .venv_ai_agent/bin/python .venv_ai_agent/agent_core/ai_agent.py

      - name: Deploy 5-Node Cluster & Validate Specifications
        shell: bash
        run: |
          echo "[Deployment] 클러스터 노드 5대 로컬 런타임 백그라운드 구동 개시..."
          .venv_ai_agent/bin/python generated/server/gateway/gateway_main.py &
          GW_PID=$!
          .venv_ai_agent/bin/python generated/server/security/security_main.py &
          SEC_PID=$!
          .venv_ai_agent/bin/python generated/server/migration/migration_main.py &
          MIG_PID=$!
          .venv_ai_agent/bin/python generated/server/config/config_main.py &
          CFG_PID=$!
          .venv_ai_agent/bin/python generated/server/upgrade/upgrade_main.py &
          UPG_PID=$!

          cat << 'PYEOF' > wait_for_ports.py
          import socket, time, sys
          ports = [8000, 8060, 8070, 8080, 8090]
          for p in ports:
              ready = False
              for _ in range(30): 
                  with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
                      if s.connect_ex(('127.0.0.1', p)) == 0:
                          ready = True
                          break
                  time.sleep(0.5)
              if not ready: sys.exit(1)
          PYEOF
          .venv_ai_agent/bin/python wait_for_ports.py

          echo "[Validation] 배포된 5대 분산 서버 전체 통합 교차 진단 개시..."
          gw_status=$(.venv_ai_agent/bin/python -c "import urllib.request, json; d=json.loads(urllib.request.urlopen('http://127.0.0.1:8000/health').read()); print(d.get('status',''))")
          sec_audit=$(.venv_ai_agent/bin/python -c "import urllib.request, json; req=urllib.request.Request('http://127.0.0.1:8080/api/v1/security/inspect',data=json.dumps({'rule_id':'SEC-101'}).encode(),headers={'Content-Type':'application/json'},method='POST'); d=json.loads(urllib.request.urlopen(req).read()); print(d.get('audit_result',''))")
          mig_status=$(.venv_ai_agent/bin/python -c "import urllib.request, json; req=urllib.request.Request('http://127.0.0.1:8090/api/v1/migrate/transfer',data=json.dumps({'target_node':'security_node_cluster','resource_count':500}).encode(),headers={'Content-Type':'application/json'},method='POST'); d=json.loads(urllib.request.urlopen(req).read()); print(d.get('status',''))")
          cfg_reg=$(.venv_ai_agent/bin/python -c "import urllib.request, json; payload={'repo_name':'grand-ops','commit_message':'Automated patch'}; req=urllib.request.Request('http://127.0.0.1:8070/api/v1/config/commit',data=json.dumps(payload).encode(),headers={'Content-Type':'application/json'},method='POST'); d=json.loads(urllib.request.urlopen(req).read()); print(d.get('status',''))")
          upg_reg=$(.venv_ai_agent/bin/python -c "import urllib.request, json; payload={'component':'security_engine','force_update':True}; req=urllib.request.Request('http://127.0.0.1:8060/api/v1/upgrade/apply',data=json.dumps(payload).encode(),headers={'Content-Type':'application/json'},method='POST'); d=json.loads(urllib.request.urlopen(req).read()); print(d.get('status',''))")

          if [ "$gw_status" = "healthy" ] && [ "$sec_audit" = "Injection Defense Triggered" ] && \
             [ "$mig_status" = "healthy" ] && [ "$cfg_reg" = "committed" ] && [ "$upg_reg" = "upgraded" ]; then
            echo "[SUCCESS] 업그레이드 노드 포함 5대 서버 구동 검증 완료."
          else
            kill "$GW_PID" "$SEC_PID" "$MIG_PID" "$CFG_PID" "$UPG_PID" 2>/dev/null || true
            exit 1
          fi

          kill "$GW_PID" "$SEC_PID" "$MIG_PID" "$CFG_PID" "$UPG_PID" 2>/dev/null || true

      # -----------------------------------------------------------------------
      # 9. OWASP 공급망 방어 1단계: CVE Lite CLI (Dependabot 인식용 package.json 강제 덤프)
      # -----------------------------------------------------------------------
      - name: OWASP CVE Lite CLI - Fast Local Dependency Scanner
        shell: bash
        run: |
          mkdir -p generated/frontend
          cd generated/frontend
          
          # Dependabot(npm)이 스캔할 수 있도록 package.json 명시적 생성
          cat << 'EOF' > package.json
          {
            "name": "enterprise-frontend-bff",
            "version": "1.0.0",
            "dependencies": {
              "cross-spawn": "5.1.0",
              "minimatch": "3.0.4"
            }
          }
          EOF
          
          npm install --package-lock-only --ignore-scripts > /dev/null 2>&1 || true
          npx -y cve-lite-cli advisories sync
          npx -y cve-lite-cli . --offline --verbose > ../security_reports/CVE_LITE_FIX_PLAN.txt || true

      - name: OWASP Dependency-Check Scan
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Enterprise-Grand-Ops-Multi-Node'
          path: '.'
          format: 'HTML'
          out: 'generated/security_reports'
        continue-on-error: true

      - name: OWASP dep-scan & Dependency-Track Integration
        shell: bash
        run: |
          .venv_ai_agent/bin/pip install appthreat-depscan cyclonedx-bom
          .venv_ai_agent/bin/cyclonedx-py environment --outfile generated/security_reports/sbom.json || true
          .venv_ai_agent/bin/depscan --src . --reports-dir generated/security_reports/depscan || true

      - name: Automated Vulnerability Auto-Remediation & Dependency Upgrade
        shell: bash
        run: |
          .venv_ai_agent/bin/python -m pip install --upgrade --upgrade-strategy eager pip setuptools wheel fastapi uvicorn
          if [ -d "generated/frontend" ]; then
            cd generated/frontend
            npm audit fix --force > /dev/null 2>&1 || true
            cd ../..
          fi

      - name: Commit & Push Generated Resources & Server Deployments
        if: github.event_name != 'pull_request'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -d "generated" ]; then
            git add generated/
            if git diff-index --quiet HEAD; then
              echo "[INFO] 인프라 변경사항 없음."
            else
              git commit -m "chore: Dependabot 완벽 연동을 위한 명세서(requirements.txt / package.json) 생성 및 푸시 [skip ci]"
              git push
            fi
          fi

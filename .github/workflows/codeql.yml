name: "CodeQL Advanced Security Scan with AI Assistant"

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "generated/**"
      - ".pytest_cache/**"
      - "__pycache__/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "generated/**"
      - ".pytest_cache/**"
      - "__pycache__/**"
  schedule:
    # 매주 화요일 02:21 UTC 실행 (한국시간 화요일 11:21)
    - cron: "21 2 * * 2"
  workflow_dispatch:

permissions:
  contents: write           # AI 가상 에이전트가 리소스를 파일로 생성 후 저장소에 커밋/푸시하기 위한 권한
  actions: read
  security-events: write    # CodeQL 결과를 저장소 보안 탭에 반영하기 위한 필수 권한

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: "Analyze (${{ matrix.language }})"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      # GitHub Repository -> Settings -> Secrets and variables -> Actions에 값을 등록해야 정상 정상 작동합니다.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    strategy:
      fail-fast: false
      matrix:
        language:
          - python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Print scan context
        shell: bash
        run: |
          echo "[CodeQL] repository=${GITHUB_REPOSITORY}"
          echo "[CodeQL] ref=${GITHUB_REF}"
          echo "[CodeQL] language=${{ matrix.language }}"
          echo "[CodeQL] AI Integration Enabled: Virtual Environment Deployment"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

      # -------------------------------------------------------------------------
      #  AI 가상 에이전트 격리 환경 설치 및 실행 (에러 완벽 수정본)
      # -------------------------------------------------------------------------
      
      - name: Setup Python Runtime
        # 기존 'python-python' 오타를 'python-version'으로 올바르게 수정했습니다.
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Isolated Virtual Environment
        # 글로벌 환경 오염을 완벽히 차단하기 위해 독립 가상 환경을 명시적으로 구축합니다.
        run: |
          python -m venv .venv_ai_agent
          .venv_ai_agent/bin/pip install --upgrade pip
          .venv_ai_agent/bin/pip install google-genai anthropic

      - name: Deploy AI Virtual Agent Code Base
        # 프로젝트 메인 소스 트리를 더럽히지 않도록 가상환경 내부 은밀한 공간에 에이전트 엔진 코드를 빌드합니다.
        shell: bash
        run: |
          mkdir -p .venv_ai_agent/agent_core
          
          cat << 'EOF' > .venv_ai_agent/agent_core/ai_agent.py
          import os
          import json

          def run_agent():
              gemini_key = os.environ.get("GEMINI_API_KEY")
              claude_key = os.environ.get("ANTHROPIC_API_KEY")
              
              prompt_content = """
              당신은 최고 수준의 DevSecOps AI 분석 에이전트입니다. 
              현재 저장소의 파이썬 소스 코드 구조를 기반으로 아래 리소스를 생성해 주세요.
              1. 보안 조치 핵심 가이드 (Markdown 형식)
              2. 인프라 보안 강화를 위한 추천 가상 환경 설정 파일 예시 (.env.example 구조)
              """

              ai_output = None

              # 1. Gemini 에이전트 작동 시도
              if gemini_key:
                  print("[Virtual Agent] Gemini 에이전트가 분석을 개시합니다...")
                  try:
                      from google import genai
                      client = genai.Client(api_key=gemini_key)
                      response = client.models.generate_content(
                          model='gemini-2.5-flash',
                          contents=prompt_content,
                      )
                      ai_output = response.text
                  except Exception as e:
                      print(f"[ERROR] Gemini 에이전트 통신 실패: {e}")

              # 2. Claude 에이전트 작동 시도 (Fallback)
              elif claude_key:
                  print("[Virtual Agent] Claude 에이전트가 분석을 개시합니다...")
                  try:
                      from anthropic import Anthropic
                      client = Anthropic(api_key=claude_key)
                      message = client.messages.create(
                          model="claude-3-5-sonnet-latest",
                          max_tokens=2048,
                          messages=[{"role": "user", "content": prompt_content}]
                      )
                      ai_output = message.content[0].text
                  except Exception as e:
                      print(f"[ERROR] Claude 에이전트 통신 실패: {e}")
              
              # 3. API 키가 둘 다 없는 비상 상황 대처 로직 (워크플로우 중단 방지 방어 코드)
              else:
                  print("[WARN] GitHub Secrets에 등록된 AI API 키가 감지되지 않았습니다.")
                  print("[WARN] 에러로 인한 전체 파이프라인 중단을 막기 위해 기본 보안 템플릿 리소스를 생성합니다.")
                  ai_output = "### [시스템 안내]\nGitHub Secrets에 AI API 키(`GEMINI_API_KEY` 또는 `ANTHROPIC_API_KEY`)를 등록하시면, 이 영역에 실시간 AI 코드 정밀 진단 결과가 업데이트됩니다."

              # 4. 물리적 리소스 데이터 및 파일 구조 자동 생성
              os.makedirs("generated/security_reports", exist_ok=True)
              
              # 파일 1: AI 분석 가이드라인 마크다운 문서 생성
              with open("generated/security_reports/AI_FIX_GUIDE.md", "w", encoding="utf-8") as f:
                  f.write("# AI Virtual Agent Security Report\n\n")
                  f.write(ai_output)
              
              # 파일 2: 에이전트 표준 가상환경 설정 템플릿 생성
              with open("generated/security_reports/.env.example", "w", encoding="utf-8") as f:
                  f.write("# Auto-generated by AI Security Agent\n")
                  f.write("DEBUG=False\n")
                  f.write("SECURITY_SECRETS_ROTATION_DAYS=30\n")
                  f.write("ALLOWED_HOSTS=localhost,127.0.0.1\n")

              print("[Virtual Agent] 파일 및 인프라 설정 리소스 생성이 정상 처리되었습니다.")

          if __name__ == "__main__":
              run_agent()
          EOF

      - name: Execute AI Virtual Agent via Venv Path
        # 명시적 경로 지정을 통해 가상 환경 내부의 파이썬 인터프리터로 에이전트를 확실하게 트리거합니다.
        shell: bash
        run: |
          .venv_ai_agent/bin/python .venv_ai_agent/agent_core/ai_agent.py

      - name: Commit & Push Generated Resources
        # 풀 리퀘스트(PR) 검사 도중이 아닐 때만 generated 리소스를 원격 저장소에 반영합니다.
        if: github.event_name != 'pull_request'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -d "generated" ]; then
            git add generated/
            # 변경사항이 있을 때만 커밋을 수행하여 무의미한 커밋 생성 방지
            git diff-index --quiet HEAD || (git commit -m "chore: 가상 에이전트 생성 리소스 파일 동적 업데이트 [skip ci]" && git push)
          fi

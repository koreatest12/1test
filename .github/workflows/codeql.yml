name: "CodeQL Advanced Security Scan with Offline & Online AI Agents"

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "generated/**"
      - ".pytest_cache/**"
      - "__pycache__/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "generated/**"
      - ".pytest_cache/**"
      - "__pycache__/**"
  schedule:
    - cron: "21 2 * * 2"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  actions: read
  security-events: write 

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: "Analyze and Generate Mass Resources"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        language: [ 'python', 'java' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      # -----------------------------------------------------------------------
      # [CodeQL] 보안 분석 초기화 및 수행
      # -----------------------------------------------------------------------
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

      # -----------------------------------------------------------------------
      # [Python Agent] 런타임 세팅 및 가상환경 구축
      # -----------------------------------------------------------------------
      - name: Setup Python Runtime
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create Isolated Virtual Environment & Install Server Packages
        run: |
          python -m venv .venv_ai_agent
          .venv_ai_agent/bin/pip install --upgrade pip
          .venv_ai_agent/bin/pip install urllib3 fastapi uvicorn httpx python-multipart pydantic

      # -----------------------------------------------------------------------
      # [Python Agent] 오프라인 6노드 서버 아키텍처 및 3만건 시드 데이터 스크립트 작성
      # -----------------------------------------------------------------------
      - name: Deploy Offline Virtual Agent Engine (Python)
        shell: bash
        run: |
          mkdir -p .venv_ai_agent/agent_core
          cat > .venv_ai_agent/agent_core/ai_agent.py << 'PYEOF'
          import os, json, textwrap, hashlib, random, uuid
          def run_agent():
              print("[Python Agent] 6노드 마이크로서비스 및 3만건 Seed 데이터 인프라 생성 시작...")
              dirs = ["generated/security_reports", "generated/openapi", 
                      "generated/server/gateway", "generated/server/security", "generated/server/migration", 
                      "generated/server/config", "generated/server/upgrade", "generated/server/fencing", 
                      "generated/data/seed", "generated/docker_cluster"]
              for d in dirs: os.makedirs(d, exist_ok=True)
              
              # 10,000개 노드 생성
              nodes = [{"node_id": f"NODE-{i:05d}", "status": "provisioned"} for i in range(1, 10001)]
              with open("generated/data/seed/mass_node_registry.json", "w") as f: json.dump(nodes, f)
              
              # Fencing 노드를 포함한 서버 코드 자동 생성
              fen_code = textwrap.dedent("""\
                  import uvicorn
                  from fastapi import FastAPI, HTTPException
                  from pydantic import BaseModel, Field
                  app = FastAPI(title='Enterprise Fencing Service', version='1.5.0')
                  class FenceRule(BaseModel):
                      target_ip: str = Field(..., pattern=r'^([0-9]{1,3}\.){3}[0-9]{1,3}$')
                      action: str = Field(..., pattern=r'^(ALLOW|DENY)$')
                  @app.get('/health')
                  def fencing_health(): return {'status': 'healthy'}
                  @app.post('/api/v1/fencing/apply')
                  def apply_fence(rule: FenceRule):
                      if rule.target_ip == '127.0.0.1' and rule.action == 'DENY': raise HTTPException(403)
                      return {'status': 'fenced', 'ip': rule.target_ip, 'action': rule.action}
                  if __name__ == '__main__': uvicorn.run(app, host='0.0.0.0', port=8050)
              """)
              with open("generated/server/fencing/fencing_main.py", "w") as f: f.write(fen_code)
              print("[Python Agent] 오프라인 리소스 대량 생성 완료.")
          if __name__ == "__main__": run_agent()
          PYEOF
          .venv_ai_agent/bin/python .venv_ai_agent/agent_core/ai_agent.py

      # -----------------------------------------------------------------------
      # [Java Agent] 런타임 세팅 
      # -----------------------------------------------------------------------
      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      # -----------------------------------------------------------------------
      # [Java Agent] API Key 누락 방어 로직이 적용된 대량 데이터 동시 생성 내장 및 실행
      # -----------------------------------------------------------------------
      - name: Embed, Compile and Execute Java Massive AI Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: bash
        run: |
          echo "[Java Agent] 강력한 오프라인 대체 로직이 포함된 소스 코드 생성 중..."
          cat << 'JAVAEOF' > MassiveClaudeAgent.java
          import java.io.IOException;
          import java.net.URI;
          import java.net.http.HttpClient;
          import java.net.http.HttpRequest;
          import java.net.http.HttpResponse;
          import java.nio.file.Files;
          import java.nio.file.Path;
          import java.nio.file.Paths;
          import java.nio.file.StandardOpenOption;
          import java.time.Duration;
          import java.util.List;
          import java.util.Random;
          import java.util.concurrent.*;
          import java.util.stream.Collectors;
          import java.util.stream.IntStream;

          public class MassiveClaudeAgent {
              private static final String CLAUDE_API_URL = "https://api.anthropic.com/v1/messages";
              private static final String ANTHROPIC_VERSION = "2023-06-01";
              private final String apiKey;
              private final HttpClient httpClient;
              private final ExecutorService executor = Executors.newFixedThreadPool(50);
              private final Semaphore rateLimiter = new Semaphore(5); 
              private final Random random = new Random();
              private final boolean isMockMode;

              public MassiveClaudeAgent() {
                  String envKey = System.getenv("ANTHROPIC_API_KEY");
                  // 완벽한 Null / 공백 / "null" 문자열 방어
                  if (envKey == null || envKey.isBlank() || "null".equalsIgnoreCase(envKey.trim())) {
                      System.err.println("[WARN] ANTHROPIC_API_KEY가 없습니다. 🚀 로컬 고성능 Mock 데이터 제너레이터로 전환합니다.");
                      this.apiKey = null;
                      this.isMockMode = true;
                  } else {
                      this.apiKey = envKey;
                      this.isMockMode = false;
                  }
                  this.httpClient = HttpClient.newBuilder().executor(executor).connectTimeout(Duration.ofSeconds(15)).build();
              }

              public CompletableFuture<String> callClaudeApi(String prompt, int ruleIndex) {
                  // [대폭 수정] API 키 누락 시, 완벽한 형태의 가짜 JSON 데이터를 동시성 제어 하에 생성
                  if (this.isMockMode) {
                      return CompletableFuture.supplyAsync(() -> {
                          try {
                              rateLimiter.acquire(); // Mock 모드에서도 동시성 과부하를 막기 위해 세마포어 유지
                              Thread.sleep(random.nextInt(30) + 10); // 실제 네트워크 통신과 유사한 미세 딜레이 시뮬레이션
                              
                              String mockIp = "192.168." + random.nextInt(255) + "." + random.nextInt(255);
                              String action = random.nextBoolean() ? "ALLOW" : "DENY";
                              
                              // Claude AI가 응답할 법한 완벽한 JSON 포맷 생성
                              return String.format(
                                  "{\n  \"rule_id\": \"RULE-%d\",\n  \"target_ip\": \"%s\",\n  \"action\": \"%s\",\n  \"generated_by\": \"offline_mock_agent\"\n}",
                                  ruleIndex, mockIp, action
                              );
                          } catch (Exception e) {
                              throw new CompletionException(e);
                          } finally {
                              rateLimiter.release();
                          }
                      }, executor);
                  }

                  // 정상적인 API 키가 있을 경우의 로직
                  String jsonPayload = String.format(
                          "{\"model\": \"claude-3-haiku-20240307\", \"max_tokens\": 150, \"messages\": [{\"role\": \"user\", \"content\": \"%s\"}]}", 
                          prompt.replace("\"", "\\\"")
                  );
                  HttpRequest request = HttpRequest.newBuilder()
                          .uri(URI.create(CLAUDE_API_URL))
                          .header("Content-Type", "application/json")
                          .header("x-api-key", this.apiKey)
                          .header("anthropic-version", ANTHROPIC_VERSION)
                          .POST(HttpRequest.BodyPublishers.ofString(jsonPayload))
                          .build();
                          
                  return CompletableFuture.supplyAsync(() -> {
                      try {
                          rateLimiter.acquire(); 
                          HttpResponse<String> response = httpClient.send(request, HttpResponse.BodyHandlers.ofString());
                          if (response.statusCode() == 429) {
                              System.err.println("[WARN] Rate Limit 초과 (429). 5초 대기 후 재시도 필요.");
                              Thread.sleep(5000); 
                          } else if (response.statusCode() != 200) {
                              throw new RuntimeException("HTTP " + response.statusCode() + ": " + response.body());
                          }
                          return response.body();
                      } catch (Exception e) {
                          throw new CompletionException(e);
                      } finally {
                          rateLimiter.release(); 
                      }
                  }, executor);
              }

              public void generateMassResources(int totalCount, int batchSize) {
                  String modeName = isMockMode ? "오프라인 Mock 생성 모드" : "온라인 Claude API 모드";
                  System.out.println("[Mass Generator] 총 " + totalCount + "건 리소스를 배치 " + batchSize + " 단위 동시/중복 생성... (" + modeName + ")");
                  
                  Path outputDir = Paths.get("generated/data/ai_seed");
                  try { Files.createDirectories(outputDir); } catch (IOException e) { throw new RuntimeException(e); }

                  for (int batch = 0; batch < totalCount; batch += batchSize) {
                      int currentBatchEnd = Math.min(batch + batchSize, totalCount);
                      System.out.println(" -> Processing Batch [" + batch + " ~ " + (currentBatchEnd - 1) + "]");
                      
                      List<CompletableFuture<Void>> futures = IntStream.range(batch, currentBatchEnd)
                              .mapToObj(i -> {
                                  String prompt = "마이크로서비스 Fencing 노드 데이터 생성을 위한 무작위 방화벽 룰 1개를 JSON 형식으로만 응답해줘. (ID: RULE-" + i + ")";
                                  return callClaudeApi(prompt, i).thenAccept(result -> {
                                      saveToFile(outputDir, "rule_" + i + ".json", result);
                                  }).exceptionally(ex -> {
                                      System.err.println("[FAILED] ID: " + i + " - " + ex.getMessage());
                                      return null;
                                  });
                              }).collect(Collectors.toList());
                      
                      // 현재 배치의 병렬 처리가 끝날때까지 대기
                      CompletableFuture.allOf(futures.toArray(new CompletableFuture[0])).join();
                  }
                  executor.shutdown();
                  System.out.println("[Mass Generator] " + modeName + " 기반 대량 리소스 생성이 완료되었습니다.");
              }

              private void saveToFile(Path dir, String fileName, String content) {
                  try {
                      Files.writeString(dir.resolve(fileName), content + "\n", StandardOpenOption.CREATE, StandardOpenOption.TRUNCATE_EXISTING);
                  } catch (IOException e) { System.err.println("파일 쓰기 실패: " + fileName); }
              }

              public static void main(String[] args) {
                  MassiveClaudeAgent agent = new MassiveClaudeAgent();
                  // 500건 데이터를 100건 단위로 쪼개어 스레드풀로 병렬 중복 처리 (키 없으면 Mock 생성)
                  agent.generateMassResources(500, 100); 
              }
          }
          JAVAEOF
          
          echo "[Java Agent] 컴파일 시작..."
          javac MassiveClaudeAgent.java
          
          echo "[Java Agent] 컴파일 완료. 동시/중복 뱃치 데이터 추출을 실행합니다."
          java MassiveClaudeAgent

      # -----------------------------------------------------------------------
      # [Git Sync] 대량 생성된 모든 리소스를 병합 후 GitHub 레포지토리에 자동 푸시
      # -----------------------------------------------------------------------
      - name: Commit & Push Mass Generated Resources
        if: github.event_name != 'pull_request'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -d "generated" ]; then
            git add generated/
            if git diff-index --quiet HEAD; then
              echo "[INFO] 인프라 변경사항 없음."
            else
              git commit -m "chore: Python 6노드 인프라 및 Java Agent 무중단 Seed 데이터 자동 적재 [skip ci]"
              CURRENT_BRANCH=${GITHUB_REF#refs/heads/}
              git pull --rebase --autostash origin $CURRENT_BRANCH
              git push origin HEAD
            fi
          fi

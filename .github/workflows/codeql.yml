name: "CodeQL Advanced Security Scan with AI Assistant"

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "generated/**"
      - ".pytest_cache/**"
      - "__pycache__/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "generated/**"
      - ".pytest_cache/**"
      - "__pycache__/**"
  schedule:
    # 매주 화요일 02:21 UTC 실행 (한국시간 화요일 11:21)
    - cron: "21 2 * * 2"
  workflow_dispatch:

permissions:
  contents: write           # AI가 생성한 가이드나 패치 파일을 저장소에 커밋/푸시하기 위해 write로 확장
  actions: read
  security-events: write    # CodeQL 결과를 SARIF로 기록하기 위해 유지

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: "Analyze (${{ matrix.language }})"
    runs-on: ubuntu-latest
    timeout-minutes: 45     # AI API 호출 및 파일 생성 시간을 고려하여 타임아웃을 살짝 늘렸습니다.
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      # 저장소 Secrets에 ANTHROPIC_API_KEY 또는 GEMINI_API_KEY를 등록해야 합니다.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    strategy:
      fail-fast: false
      matrix:
        language:
          - python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true # AI가 코드를 수정하거나 문서를 추가한 뒤 푸시할 수 있도록 true로 변경

      - name: Print scan context
        shell: bash
        run: |
          echo "[CodeQL] repository=${GITHUB_REPOSITORY}"
          echo "[CodeQL] ref=${GITHUB_REF}"
          echo "[CodeQL] sha=${GITHUB_SHA}"
          echo "[CodeQL] language=${{ matrix.language }}"
          echo "[CodeQL] node24=${FORCE_JAVASCRIPT_ACTIONS_TO_NODE24}"
          echo "[CodeQL] AI Integration Enabled: Processing with Claude/Gemini if keys are present."

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          # AI 단계에서 참고할 수 있도록 CodeQL 분석 결과를 SARIF 파일(텍스트 형태의 보안 리포트)로 로컬에 남깁니다.
          upload: true

      # -------------------------------------------------------------------------
      #  AI 서비스 연동 및 리소스 파일 생성 단계 (추가된 파트)
      # -------------------------------------------------------------------------
      
      - name: Setup Python for AI Scripts
        # AI API를 가볍게 호출하고 파일을 가공하기 위해 파이썬 환경을 활용합니다.
        uses: actions/setup-python@v5
        with:
          python-python: '3.11'

      - name: Install AI SDKs
        run: |
          pip install google-genai anthropic

      - name: Generate AI Security Reports and Code Patches
        shell: bash
        run: |
          cat << 'EOF' > ai_analysis.py
          import os
          import json
          from google import genai
          from anthropic import Anthropic

          # 1. 환경 변수에서 API 키 확인
          gemini_key = os.environ.get("GEMINI_API_KEY")
          claude_key = os.environ.get("ANTHROPIC_API_KEY")
          
          # 분석 타겟 코드 예시 (실제 저장소 내 주요 파일이나 CodeQL SARIF 결과를 읽어와 프롬프트에 주입할 수 있습니다)
          # 여기서는 데모용으로 간단한 타겟 요약 정보를 구성합니다.
          prompt_content = """
          당신은 최고 수준의 DevSecOps AI 분석가입니다. 
          현재 저장소의 파이썬 소스 코드에 대한 보안 진단을 수행하고 다음 리소스를 생성해 주세요.
          1. 발견 가능한 잠재적 취약점 요약 및 조치 가이드 (Markdown 형식)
          2. 보안 강화를 위한 추천 설정 파일 예시 (.env.example 이나 복합 설정 구조)
          """

          # 2. Gemini 우선 처리 (키가 존재할 경우)
          if gemini_key:
              print("[AI] Gemini API를 사용하여 리소스를 생성합니다...")
              try:
                  client = genai.Client(api_key=gemini_key)
                  response = client.models.generate_content(
                      model='gemini-2.5-flash',
                      contents=prompt_content,
                  )
                  ai_output = response.text
              except Exception as e:
                  print(f"[ERROR] Gemini 호출 실패: {e}")
                  ai_output = None

          # 3. Gemini 키가 없고 Claude 키가 있다면 Claude로 대체 처리
          elif claude_key:
              print("[AI] Claude API를 사용하여 리소스를 생성합니다...")
              try:
                  client = Anthropic(api_key=claude_key)
                  message = client.messages.create(
                      model="claude-3-5-sonnet-latest",
                      max_tokens=2048,
                      messages=[{"role": "user", "content": prompt_content}]
                  )
                  ai_output = message.content[0].text
              except Exception as e:
                  print(f"[ERROR] Claude 호출 실패: {e}")
                  ai_output = None
          else:
              print("[WARN] AI API 키가 설정되지 않았습니다. 단계를 건너뜁니다.")
              ai_output = None

          # 4. 결과 파일 및 리소스 데이터 물리적 생성
          if ai_output:
              os.makedirs("generated/security_reports", exist_ok=True)
              
              # 가이드 문서 파일 생성
              with open("generated/security_reports/AI_FIX_GUIDE.md", "w", encoding="utf-8") as f:
                  f.write("# AI Generated Security Guide\n\n")
                  f.write(ai_output)
                  
              print("[AI] 리소스 및 보안 가이드 파일 생성이 완료되었습니다: generated/security_reports/AI_FIX_GUIDE.md")
          EOF
          
          # 스크립트 실행
          python ai_analysis.py

      - name: Commit & Push Generated Resources
        # PR(Pull Request) 이벤트 도중에는 무한 루프나 권한 꼬임을 방지하기 위해, 
        # 주로 main 브랜치 push나 스케줄러 실행 시에만 자동 커밋하도록 분기 처리하는 것이 안전합니다.
        if: github.event_name != 'pull_request'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # generated 폴더에 새로 생성된 파일이 있는지 확인 후 커밋
          if [ -d "generated" ]; then
            git add generated/
            git diff-index --quiet HEAD || (git commit -m "chore: 고도화된 AI 보안 리포트 및 리소스 파일 자동 업데이트 [skip ci]" && git push)
          fi

name: "Enterprise Django CI & Advanced Security Pipeline"

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "generated/**"
      - ".pytest_cache/**"
      - "__pycache__/**"
  pull_request:
    branches: [ main ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "generated/**"
      - ".pytest_cache/**"
      - "__pycache__/**"
  schedule:
    - cron: "21 2 * * 2"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # [Node 환경 최적화] GitHub Actions 내부 러너의 Node 실행 버전을 Node24로 강제 지정 및 동기화합니다.
  ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: "node24"
  NODE_OPTIONS: "--no-deprecation"
  PYTHONUTF8: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

permissions:
  contents: write
  actions: read
  security-events: write 

concurrency:
  group: enterprise-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =======================================================================
  # [Job 1] Django Advanced CI (PostgreSQL DB 통합 마이그레이션 검증)
  # =======================================================================
  django-advanced-ci:
    name: "Django CI (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: django_user
          POSTGRES_PASSWORD: django_password
          POSTGRES_DB: django_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Advanced Django & PostgreSQL Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "Django>=4.2,<5.3" psycopg2-binary pytest pytest-django coverage flake8 black isort bandit
          if [ -f requirements-ci.txt ]; then pip install -r requirements-ci.txt; elif [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Detect Django Project
        id: django_detect
        run: |
          if [ -f manage.py ]; then echo "has_django=true" >> "$GITHUB_OUTPUT"; else echo "has_django=false" >> "$GITHUB_OUTPUT"; fi

      - name: Code Quality & Static Security Checks
        if: steps.django_detect.outputs.has_django == 'true'
        run: |
          black --check . || true
          isort --check-only --diff . || true
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
          bandit -r . -x tests/ -ll -ii || true

      - name: Django PostgreSQL DB Migrations & Deploy Checks
        if: steps.django_detect.outputs.has_django == 'true'
        env:
          DATABASE_URL: postgres://django_user:django_password@localhost:5432/django_test_db
        run: |
          echo "1. Checking Missing Migrations..."
          python manage.py makemigrations --check --dry-run || true
          echo "2. Executing Real DB Migrations to PostgreSQL..."
          python manage.py migrate || true
          echo "3. Checking System Deploy Settings..."
          python manage.py check --deploy --fail-level ERROR || true
          echo "4. Checking Static Files..."
          python manage.py collectstatic --no-post-process --noinput || true

      - name: Run Django Tests with DB Coverage
        if: steps.django_detect.outputs.has_django == 'true'
        env:
          DATABASE_URL: postgres://django_user:django_password@localhost:5432/django_test_db
        run: |
          coverage run manage.py test --verbosity 2
          coverage report -m || true

  # =======================================================================
  # [Job 2] Enterprise AI Pipeline (7-Node 고유 포트 아키텍처 및 대량 리소스 제어)
  # =======================================================================
  enterprise-ai-security:
    name: "AI Agents & OWASP PostgreSQL Supply Chain Security"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python, Java & Node.js Runtimes
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Pre-Deploy Source Code Files for CodeQL
        shell: bash
        run: |
          mkdir -p .venv_ai_agent/agent_core src/main/java generated/security_reports generated/frontend
          
          # [Java AI Agent 소스 생성]
          cat << 'JAVAEOF' > src/main/java/MassiveClaudeAgent.java
          import java.io.IOException; import java.net.URI; import java.net.http.HttpClient; import java.net.http.HttpRequest; import java.net.http.HttpResponse; import java.nio.file.Files; import java.nio.file.Path; import java.nio.file.Paths; import java.nio.file.StandardOpenOption; import java.time.Duration; import java.util.List; import java.util.Random; import java.util.concurrent.*; import java.util.stream.Collectors; import java.util.stream.IntStream;
          public class MassiveClaudeAgent {
              private final String apiKey; private final HttpClient httpClient; private final ExecutorService executor = Executors.newFixedThreadPool(50); private final Semaphore rateLimiter = new Semaphore(5); private final Random random = new Random(); private final boolean isMockMode;
              public MassiveClaudeAgent() {
                  String envKey = System.getenv("ANTHROPIC_API_KEY");
                  if (envKey == null || envKey.isBlank() || "null".equalsIgnoreCase(envKey.trim())) { this.apiKey = null; this.isMockMode = true; } else { this.apiKey = envKey; this.isMockMode = false; }
                  this.httpClient = HttpClient.newBuilder().executor(executor).connectTimeout(Duration.ofSeconds(15)).build();
              }
              public CompletableFuture<String> callClaudeApi(String prompt, int ruleIndex) {
                  if (this.isMockMode) {
                      return CompletableFuture.supplyAsync(() -> {
                          try { rateLimiter.acquire(); Thread.sleep(random.nextInt(30) + 10); String mockIp = "192.168." + random.nextInt(255) + "." + random.nextInt(255); String action = random.nextBoolean() ? "ALLOW" : "DENY"; return String.format("{\n  \"rule_id\": \"RULE-%d\",\n  \"target_ip\": \"%s\",\n  \"action\": \"%s\",\n  \"generated_by\": \"offline_mock_agent\",\n  \"engine_version\": \"2.0.1\"\n}", ruleIndex, mockIp, action); } catch (Exception e) { throw new CompletionException(e); } finally { rateLimiter.release(); }
                      }, executor);
                  }
                  String jsonPayload = String.format("{\"model\": \"claude-3-haiku-20240307\", \"max_tokens\": 150, \"messages\": [{\"role\": \"user\", \"content\": \"%s\"}]}", prompt.replace("\"", "\\\"")); HttpRequest request = HttpRequest.newBuilder().uri(URI.create("https://api.anthropic.com/v1/messages")).header("Content-Type", "application/json").header("x-api-key", this.apiKey).header("anthropic-version", "2023-06-01").POST(HttpRequest.BodyPublishers.ofString(jsonPayload)).build();
                  return CompletableFuture.supplyAsync(() -> {
                      try { rateLimiter.acquire(); HttpResponse<String> response = httpClient.send(request, HttpResponse.BodyHandlers.ofString()); if (response.statusCode() == 429) { Thread.sleep(5000); } else if (response.statusCode() != 200) { throw new RuntimeException("HTTP " + response.statusCode()); } return response.body(); } catch (Exception e) { throw new CompletionException(e); } finally { rateLimiter.release(); }
                  }, executor);
              }
              public void generateMassResources(int totalCount, int batchSize) {
                  Path outputDir = Paths.get("generated/data/ai_seed"); try { Files.createDirectories(outputDir); } catch (IOException e) { throw new RuntimeException(e); }
                  for (int batch = 0; batch < totalCount; batch += batchSize) {
                      int currentBatchEnd = Math.min(batch + batchSize, totalCount);
                      List<CompletableFuture<Void>> futures = IntStream.range(batch, currentBatchEnd).mapToObj(i -> callClaudeApi("Rule", i).thenAccept(result -> { try { Files.writeString(outputDir.resolve("rule_" + i + ".json"), result + "\n", StandardOpenOption.CREATE, StandardOpenOption.TRUNCATE_EXISTING); } catch (IOException e) {} }).exceptionally(ex -> null)).collect(Collectors.toList());
                      CompletableFuture.allOf(futures.toArray(new CompletableFuture[0])).join();
                  }
                  executor.shutdown();
              }
              public static void main(String[] args) { new MassiveClaudeAgent().generateMassResources(500, 100); }
          }
          JAVAEOF

          # [Python Agent - 7개 분산 마이크로서비스 엔진 고유 포트 바인딩 프로비저닝]
          cat > .venv_ai_agent/agent_core/ai_agent.py << 'PYEOF'
          import os, json, textwrap
          def run_agent():
              dirs = ["generated/server/gateway", "generated/server/security", "generated/server/migration", 
                      "generated/server/config", "generated/server/upgrade", "generated/server/fencing", 
                      "generated/server/analytics", "generated/data/seed", "generated/data/postgres_seed", 
                      "generated/data/migration_archive", "generated/docker_cluster", "generated/openapi"]
              for d in dirs: os.makedirs(d, exist_ok=True)
              
              print("[Python Agent] PostgreSQL 버전 백업 및 정적 스키마 덤프 가동...")
              with open("generated/data/postgres_seed/init_massive_db.sql", "w", encoding="utf-8") as sql_file:
                  sql_file.write("CREATE TABLE IF NOT EXISTS node_registry (node_id VARCHAR(50) PRIMARY KEY, status VARCHAR(20), zone VARCHAR(50));\n")
                  sql_file.write("CREATE TABLE IF NOT EXISTS cluster_version_history (id SERIAL PRIMARY KEY, service_name VARCHAR(50), old_version VARCHAR(20), new_version VARCHAR(20), upgraded_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP);\n")
                  for i in range(1, 1001):
                      sql_file.write(f"INSERT INTO node_registry (node_id, status, zone) VALUES ('NODE-{i:04d}', 'provisioned', 'ap-northeast-2') ON CONFLICT DO NOTHING;\n")

              # 1. Upgrade Node 소스 프로비저닝 (포트 8060)
              upg_code = textwrap.dedent("""\
                  import uvicorn; from fastapi import FastAPI, HTTPException; from fastapi.middleware.cors import CORSMiddleware; from pydantic import BaseModel
                  app = FastAPI(title='Enterprise Core Upgrade Engine', version='2.0.0')
                  app.add_middleware(CORSMiddleware, allow_origins=["*"], allow_methods=["*"], allow_headers=["*"])
                  current_cluster_versions = {"gateway": "2.0.0", "security": "2.0.0", "migration": "2.0.0", "config": "2.0.0", "upgrade": "2.0.0", "fencing": "2.0.0", "analytics": "2.0.0"}
                  class UpgradePayload(BaseModel):
                      service_name: str
                      target_version: str
                      force_update: bool = False
                  @app.get('/health')
                  def health(): return {'status': 'healthy', 'node': 'upgrade', 'port': 8060, 'registry': current_cluster_versions}
                  @app.post('/api/v1/upgrade/apply')
                  def apply_upgrade(payload: UpgradePayload):
                      if payload.service_name not in current_cluster_versions: raise HTTPException(status_code=404, detail="Service node not found")
                      old_v = current_cluster_versions[payload.service_name]
                      current_cluster_versions[payload.service_name] = payload.target_version
                      return {"status": "upgraded", "service": payload.service_name, "previous_version": old_v, "current_version": payload.target_version, "strategy": "Zero-Downtime Rolling Patch"}
                  if __name__ == '__main__': uvicorn.run(app, host='0.0.0.0', port=8060)
              """)
              with open("generated/server/upgrade/upgrade_main.py", "w", encoding="utf-8") as f: f.write(upg_code)

              # 2. Fencing Node 소스 프로비저닝 (포트 8050)
              fen_code = textwrap.dedent("""\
                  import uvicorn; from fastapi import FastAPI; from fastapi.middleware.cors import CORSMiddleware; from pydantic import BaseModel, Field
                  app = FastAPI(title='Enterprise Fencing Service', version='2.0.0'); app.add_middleware(CORSMiddleware, allow_origins=["*"], allow_methods=["*"], allow_headers=["*"])
                  class FenceRule(BaseModel): target_ip: str = Field(..., pattern=r'^([0-9]{1,3}\.){3}[0-9]{1,3}$'); action: str = Field(..., pattern=r'^(ALLOW|DENY)$')
                  @app.get('/health')\ndef fencing_health(): return {'status': 'healthy', 'node': 'fencing', 'port': 8050, 'version': '2.0.0'}
                  if __name__ == '__main__': uvicorn.run(app, host='0.0.0.0', port=8050)
              """)
              with open("generated/server/fencing/fencing_main.py", "w", encoding="utf-8") as f: f.write(fen_code)
              
              # 3. 나머지 5개 서비스 노드: 명확하고 엄격한 독립 포트 할당 (Address already in use 충돌 원천 제거)
              port_mapping = {'gateway': 8000, 'analytics': 8040, 'config': 8070, 'security': 8080, 'migration': 8090}
              for svc, port in port_mapping.items():
                  code = f"import uvicorn; from fastapi import FastAPI; from fastapi.middleware.cors import CORSMiddleware\napp = FastAPI(title='{svc.upper()} Node', version='2.0.0')\napp.add_middleware(CORSMiddleware, allow_origins=['*'], allow_methods=['*'], allow_headers=['*'])\n@app.get('/health')\ndef h(): return {{'status':'healthy', 'service': '{svc}', 'port': {port}, 'version': '2.0.0'}}\nif __name__ == '__main__': uvicorn.run(app, host='0.0.0.0', port={port})\n"
                  with open(f"generated/server/{svc}/{svc}_main.py", "w", encoding="utf-8") as f: f.write(code)

              # 통합 인프라 설치용 Docker Compose 빌드 스펙 작성
              all_ports = {**port_mapping, 'upgrade': 8060, 'fencing': 8050}
              compose_yaml = "version: '3.8'\nservices:\n  postgres_db:\n    image: postgres:15\n    environment:\n      POSTGRES_USER: admin\n      POSTGRES_PASSWORD: secure_password\n      POSTGRES_DB: enterprise_db\n    ports:\n      - \"5432:5432\"\n    volumes:\n      - ../data/postgres_seed:/docker-entrypoint-initdb.d\n"
              for svc, p in all_ports.items():
                  compose_yaml += f"  {svc}:\n    build: ../server/{svc}\n    ports:\n      - \"{p}:{p}\"\n    depends_on:\n      - postgres_db\n    restart: unless-stopped\n"
                  with open(f"generated/server/{svc}/requirements.txt", "w") as req: req.write("fastapi==0.110.0\nuvicorn==0.27.1\npydantic==2.6.4\n")
              with open("generated/docker_cluster/docker-compose.yml", "w") as dc: dc.write(compose_yaml)
              print("[Python Agent] 7대 독립 노드 아키텍처 인프라 매니페스트 배포 마감.")
          if __name__ == "__main__": run_agent()
          PYEOF

          cat << 'EOF' > generated/frontend/package.json
          { "name": "enterprise-frontend", "version": "1.0.0", "dependencies": { "cross-spawn": "5.1.0" } }
          EOF

      - name: Initialize CodeQL Engine
        uses: github/codeql-action/init@v3
        with:
          languages: java, python
          queries: +security-extended,security-and-quality

      - name: Execute Traceable Java Compilation
        run: javac -d bin src/main/java/MassiveClaudeAgent.java

      - name: Perform CodeQL Deep Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/pipeline-monitored-scan"
          upload: true

      - name: Run Mass Resource Generation AI Agents
        run: |
          python -m venv .venv_ai_agent
          .venv_ai_agent/bin/pip install --upgrade pip urllib3 fastapi uvicorn httpx python-multipart pydantic
          .venv_ai_agent/bin/python .venv_ai_agent/agent_core/ai_agent.py
          java -cp bin MassiveClaudeAgent

      # -----------------------------------------------------------------------
      # 8. 클러스터 실시간 기동 및 각 버전 업그레이드 기능 통합 검증 실행 (Polling 구조 최적화)
      # -----------------------------------------------------------------------
      - name: Live 7-Cluster Deployment & Version Upgrade Simulation
        shell: bash
        run: |
          echo "[Pipeline] 7대 마이크로서비스 분산 노드 고유 포트 바인딩 구동 개시..."
          .venv_ai_agent/bin/python generated/server/gateway/gateway_main.py &
          .venv_ai_agent/bin/python generated/server/analytics/analytics_main.py &
          .venv_ai_agent/bin/python generated/server/fencing/fencing_main.py &
          .venv_ai_agent/bin/python generated/server/upgrade/upgrade_main.py &
          .venv_ai_agent/bin/python generated/server/config/config_main.py &
          .venv_ai_agent/bin/python generated/server/security/security_main.py &
          .venv_ai_agent/bin/python generated/server/migration/migration_main.py &
          
          # [정밀 튜닝] 포트 컬리전이 차단된 고유 포트 맵 구조로 스펙 추출 연동
          cat << 'PYEOF' > generate_specs.py
          import urllib.request, json, os, time
          ports = {'gateway': 8000, 'analytics': 8040, 'fencing': 8050, 'upgrade': 8060, 'config': 8070, 'security': 8080, 'migration': 8090}
          os.makedirs('generated/openapi/specs', exist_ok=True)
          
          for name, port in ports.items():
              for _ in range(15):
                  try:
                      req = urllib.request.urlopen(f"http://127.0.0.1:{port}/openapi.json", timeout=2)
                      with open(f"generated/openapi/specs/{name}_openapi.json", "w", encoding="utf-8") as f:
                          json.dump(json.loads(req.read()), f, indent=2, ensure_ascii=False)
                      break
                  except Exception: time.sleep(1)
                  
          # 롤링 패치 업그레이드 코어 기능 연동 유효성 진단
          try:
              upgrade_url = "http://127.0.0.1:8060/api/v1/upgrade/apply"
              payload = json.dumps({"service_name": "gateway", "target_version": "2.1.5", "force_update": True}).encode('utf-8')
              req = urllib.request.Request(upgrade_url, data=payload, headers={'Content-Type': 'application/json'}, method='POST')
              response = urllib.request.urlopen(req, timeout=5)
              print(f"[SUCCESS] Version Upgrade Response Status: {response.status}")
          except Exception as e:
              print(f"[WARN] Version Upgrade Simulation Check: {e}")
          PYEOF
          
          .venv_ai_agent/bin/python generate_specs.py
          pkill -f uvicorn || true

      # -----------------------------------------------------------------------
      # 9. OWASP 공급망 방어 다각도 종합 스캔 공정
      # -----------------------------------------------------------------------
      - name: OWASP 4-Step Supply Chain Security Scan
        shell: bash
        run: |
          cd generated/frontend
          npm install --package-lock-only --ignore-scripts > /dev/null 2>&1 || true
          npx -y cve-lite-cli advisories sync && npx -y cve-lite-cli . --offline --json > ../security_reports/cve_lite_raw.json || true
          npm audit fix --force > /dev/null 2>&1 || true
          cd ../..
          
          .venv_ai_agent/bin/pip install cyclonedx-bom appthreat-depscan
          .venv_ai_agent/bin/cyclonedx-py environment --outfile generated/security_reports/sbom.json || true
          .venv_ai_agent/bin/depscan --src . --reports-dir generated/security_reports/depscan || true

      - name: OWASP Dependency-Check HTML Scan
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Enterprise-Multi-Node'
          path: '.'
          format: 'HTML'
          out: 'generated/security_reports'
        continue-on-error: true

      # -----------------------------------------------------------------------
      # 10. 최종 인프라 및 생성 자산 Git 형상 저장소 백업 동기화
      # -----------------------------------------------------------------------
      - name: Secure Git Concurrency Sync & Push
        if: github.event_name != 'pull_request'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -d "generated" ]; then
            git add generated/
            if ! git diff-index --quiet HEAD; then
              git commit -m "feat: Node24 호환 바인딩 및 7개 마이크로서비스 고유 포트 버전 관리 롤링 업그레이드 연동 완료 [skip ci]"
              git pull --rebase --autostash origin ${GITHUB_REF#refs/heads/}
              git push origin HEAD
            fi
          fi

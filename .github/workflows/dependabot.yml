# .github/dependabot.yml
version: 2
updates:
  # ---------------------------------------------------------------------------
  # 1. GitHub Actions 워크플로우 및 CI/CD 파이프라인 액션 모듈 자동 업그레이드
  #    (Node.js 20 만료 및 v3/v4 메이저 버전 변화를 상시 추적하여 선제 대응)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "02:00"
      timezone: "Asia/Seoul"
    assignees:
      - "sk"  # PR 자동 할당 대상
    labels:
      - "dependencies"
      - "actions"
      - "auto-upgrade"
    commit-message:
      prefix: "ci(actions)"
      include: "scope"

  # ---------------------------------------------------------------------------
  # 2. Python 백엔드 클러스터 (Gateway, Security, Migration, Config, Upgrade) 
  #    FastAPI, Uvicorn, Pydantic 등 코어 리소스 및 패키지 무결성 스캔
  # ---------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
      time: "02:10"
      timezone: "Asia/Seoul"
    assignees:
      - "sk"
    labels:
      - "dependencies"
      - "python"
      - "security-patch"
    commit-message:
      prefix: "chore(pip)"
      include: "scope"
    # 특정 하위 패키지의 메이저 업데이트로 인한 인프라 셧다운 방지 (호환성 유지)
    versioning-strategy: "increase"

  # ---------------------------------------------------------------------------
  # 3. 프론트엔드/BFF (Node.js) 망분리 테스트 환경 패키지 자동 스캔
  #    CVE Lite CLI 및 npm audit fix와 연계하여 취약점 조치 간극 제로화
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/generated/frontend"
    schedule:
      interval: "daily"
      time: "02:20"
      timezone: "Asia/Seoul"
    assignees:
      - "sk"
    labels:
      - "dependencies"
      - "npm"
      - "vulnerability-remediation"
    commit-message:
      prefix: "fix(npm)"
      include: "scope"
    # 보안(Security) 관련 업데이트를 최우선으로 취급하도록 정책 적용
    open-pull-requests-limit: 10

  # ---------------------------------------------------------------------------
  # 4. Docker 컨테이너 환경 대비 (향후 컨테이너라이징 및 k8s 이관 시 자동 활성화)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "02:30"
      timezone: "Asia/Seoul"
    assignees:
      - "sk"
    labels:
      - "dependencies"
      - "docker"
      - "infrastructure"
    commit-message:
      prefix: "chore(docker)"

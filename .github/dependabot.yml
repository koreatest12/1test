# 파일 위치: .github/dependabot.yml
version: 2
updates:
  # 1. GitHub Actions 워크플로우
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "02:00"
      timezone: "Asia/Seoul"
    assignees: ["sk"]
    labels: ["dependencies", "actions"]
    commit-message:
      prefix: "ci(actions)"

  # 2. Python 코어 패키지 (generated 디렉토리 내부의 requirements.txt 추적)
  - package-ecosystem: "pip"
    directory: "/generated"
    schedule:
      interval: "daily"
      time: "02:10"
      timezone: "Asia/Seoul"
    assignees: ["sk"]
    labels: ["dependencies", "python", "security-patch"]
    commit-message:
      prefix: "chore(pip)"
    versioning-strategy: "increase"

  # 3. 프론트엔드 망분리 환경 (BFF)
  - package-ecosystem: "npm"
    directory: "/generated/frontend"
    schedule:
      interval: "daily"
      time: "02:20"
      timezone: "Asia/Seoul"
    assignees: ["sk"]
    labels: ["dependencies", "npm", "vulnerability-remediation"]
    commit-message:
      prefix: "fix(npm)"
    open-pull-requests-limit: 10

  # 4. 통합 컨테이너 매니페스트 (docker-compose)
  - package-ecosystem: "docker"
    directory: "/generated/docker_cluster"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "02:30"
      timezone: "Asia/Seoul"
    assignees: ["sk"]
    labels: ["dependencies", "docker"]

  # 5-A. Gateway Node 컨테이너
  - package-ecosystem: "docker"
    directory: "/generated/server/gateway"
    schedule: { interval: "weekly", day: "tuesday", time: "02:30", timezone: "Asia/Seoul" }
    assignees: ["sk"]

  # 5-B. Security Node 컨테이너
  - package-ecosystem: "docker"
    directory: "/generated/server/security"
    schedule: { interval: "weekly", day: "tuesday", time: "02:30", timezone: "Asia/Seoul" }
    assignees: ["sk"]

  # 5-C. Migration Node 컨테이너
  - package-ecosystem: "docker"
    directory: "/generated/server/migration"
    schedule: { interval: "weekly", day: "tuesday", time: "02:30", timezone: "Asia/Seoul" }
    assignees: ["sk"]

  # 5-D. Config Node 컨테이너
  - package-ecosystem: "docker"
    directory: "/generated/server/config"
    schedule: { interval: "weekly", day: "tuesday", time: "02:30", timezone: "Asia/Seoul" }
    assignees: ["sk"]

  # 5-E. Upgrade Node 컨테이너
  - package-ecosystem: "docker"
    directory: "/generated/server/upgrade"
    schedule: { interval: "weekly", day: "tuesday", time: "02:30", timezone: "Asia/Seoul" }
    assignees: ["sk"]
